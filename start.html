<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Synterlude</title>

<style>
body {
    margin: 0;
    padding: 0;
    background-color: black;
    color: white;
    font-family: Arial, sans-serif;
    overflow: hidden;
}

.dot {
    position: absolute;
    width: 17px;
    height: 17px;
    border-radius: 50%;
    cursor: pointer;
}

#hint {
    position: absolute;
    color: white;
    font-family: 'Courier New', monospace;
    font-size: 15px;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
}

.text-box {
    position: absolute;
    font-size: 15px;
    font-family: 'Courier New', monospace;
}

.link-dot {
    transition: all 0.3s ease;
}

.link-dot:hover {
    box-shadow: 0 0 15px 5px rgb(255, 255, 255);
}
</style>
</head>

<body>

<div id="hint">click the dots</div>

<!-- TEXT -->
<div class="text-box" id="enter">ENTER</div>
<div class="text-box" id="about">ABOUT</div>

<script>
const hint = document.getElementById("hint");

// 🔥 Prozent-System (dein Layout bleibt gleich!)
const dots = [
    { x: 0.07, y: 0.55, sound: "startsound/echo person die flüstert Kopie.wav" },
    { x: 0.2, y: 0.25, sound: "startsound/paralysis.wav" },
    { x: 0.4, y: 0.12, sound: "startsound/aircraft1.wav" },
    { x: 0.5, y: 0.3, sound: "startsound/falling.wav" },
    { x: 0.75, y: 0.65, sound: "startsound/a_deep_bass_sound_and_laughter_pt3 Kopie.wav" },
    { x: 0.9, y: 0.75, sound: "startsound/A_mother_who_sings_aKopie.wav" },
    { x: 0.7, y: 0.9, sound: "startsound/Capture_by_horror_cl_.wav" },
    { x: 0.15, y: 0.85, sound: "startsound/Glck Prsn sht was schlm Kopie.wav" },
    { x: 0.1, y: 0.12, sound: "startsound/dream_core_.wav" },
    { x: 0.25, y: 0.55, sound: "startsound/Rave_and_really_stro_.wav" },
    { x: 0.38, y: 0.85, sound: "startsound/sinking_into_a_coma__.wav" },
    { x: 0.55, y: 0.6, sound: "startsound/A person which is dying Kopie.wav" },
    { x: 0.65, y: 0.25, sound: "startsound/a_deep_bass_sound_and_laughter_pt4 Kopie.wav" },
    { x: 0.18, y: 0.3, sound: "startsound/a_guy_who_has_such_p.wav" },
    { x: 0.32, y: 0.65, sound: "startsound/A_village_woman_sing_.wav" },
    { x: 0.45, y: 0.4, sound: "startsound/absurd Kopie.wav" },
    { x: 0.6, y: 0.12, sound: "startsound/An echo and a person whispering in German._1 Kopie.wav" },
    { x: 0.9, y: 0.25, sound: "startsound/Muslim_call_to_praye_.wav" },
    { x: 0.7, y: 0.7, sound: "startsound/Eine Person die plötzlich angst hat pt2 Kopie.wav" },
    { x: 0.78, y: 0.7, sound: "startsound/orthodox_christian_chant_pt1 Kopie.wav" }
];

const linkDots = [
    { x: 0.48, y: 0.5, link: "chant.html" },
    { x: 0.05, y: 0.07, link: "about.html" }
];

// 👉 Funktion zum Umrechnen
function setPosition(el, x, y) {
    el.style.left = (x * window.innerWidth) + "px";
    el.style.top = (y * window.innerHeight) + "px";
}

// 🎵 Sound dots
dots.forEach(item => {
    const dot = document.createElement("div");
    dot.classList.add("dot", "sound");
    dot.style.backgroundColor = "white";

    setPosition(dot, item.x, item.y);

    dot.addEventListener("click", () => {
        new Audio(item.sound).play();
    });

    document.body.appendChild(dot);
});

// 🔗 Link dots
linkDots.forEach(item => {
    const dot = document.createElement("a");
    dot.classList.add("dot", "link-dot");
    dot.href = item.link;
    dot.style.backgroundColor = "white";

    setPosition(dot, item.x, item.y);

    document.body.appendChild(dot);
});

// 🔤 TEXT POSITIONEN
// ABOUT zu about.html Dot: Offset X = 0.08 - 0.05 = 0.03, Offset Y = 0
// Anwenden auf ENTER zu chant.html Dot: 0.48 + 0.03 = 0.51, Y bleibt 0.5
setPosition(document.getElementById("enter"), 0.50, 0.5);
setPosition(document.getElementById("about"), 0.07, 0.07);

// 🔄 Bewegung bleibt gleich (aber jetzt responsive Grenzen)
document.querySelectorAll(".dot").forEach(dot => {

    if (dot.classList.contains("link-dot")) return;

    let offsetX = Math.random() * 2 - 1;
    let offsetY = Math.random() * 2 - 1;
    let speed = Math.random() * 0.4 + 0.1;

    function move() {
        let x = parseFloat(dot.style.left);
        let y = parseFloat(dot.style.top);

        offsetX += (Math.random() - 0.5) * 0.03;
        offsetY += (Math.random() - 0.5) * 0.03;

        x += offsetX * speed;
        y += offsetY * speed;

        const maxX = window.innerWidth - 17;
        const maxY = window.innerHeight - 17;

        if (x <= 0 || x >= maxX) offsetX *= -1;
        if (y <= 0 || y >= maxY) offsetY *= -1;

        dot.style.left = Math.max(0, Math.min(x, maxX)) + "px";
        dot.style.top = Math.max(0, Math.min(y, maxY)) + "px";

        requestAnimationFrame(move);
    }

    move();
});

// 💡 Klick-Hinweis bleibt gleich
document.addEventListener("click", function(event) {
    const target = event.target;

    if (!target.classList.contains("sound") && !target.classList.contains("link-dot")) {
       const hintWidth = hint.offsetWidth;
const hintHeight = hint.offsetHeight;

hint.style.left = (event.pageX - hintWidth / 2) + "px";  // horizontal zentriert
hint.style.top = (event.pageY - hintHeight - 0) + "px"; // 10px oberhalb des Cursors
        hint.style.opacity = "1";

        setTimeout(() => hint.style.opacity = "0", 3000);
    }
});
</script>

</body>
</html>
